name: Play Store Monitor

# УВАГА: автозапуск вимкнено навмисно.
#
# Стара схема (самозапуск через workflow_dispatch + запасний cron */5) себе вбила:
#   1. Два паралельні запуски одночасно писали offset у state.json.
#   2. Крок "Commit state" робив `git pull --rebase --autostash || true` — конфлікт
#      проковтувався, а `git add state.json` комітив файл із маркерами <<<<<<<.
#   3. Після цього load_state() падав на json.load() за 0 секунд у КОЖНОМУ запуску.
#   4. Крок "Trigger next run" стояв ПЕРЕД запуском бота, тому кожне падіння
#      народжувало наступний запуск → цикл із новим run кожні ~13 секунд.
#
# Робочу версію перенесено на Cloudflare Workers (cron + вебхук, стан у KV),
# де стан не лежить у git і гонок за файл не існує.
#
# Лишаємо тільки ручний запуск — на випадок разової перевірки.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: play-store-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot (one pass, no listening)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          LISTEN_SECONDS: "0"
        run: python check.py

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ніколи не комітимо зіпсований state.json — саме це поклало бота
          if ! python3 -c "import json; json.load(open('state.json'))"; then
            echo "state.json невалідний — коміт пропущено"
            exit 0
          fi

          if git diff --quiet state.json; then
            echo "no state changes"
            exit 0
          fi

          git add state.json
          git commit -m "update state [skip ci]"

          # rebase може дати конфлікт — тоді перериваємо, а не комітимо маркери
          if ! git pull --rebase; then
            git rebase --abort || true
            echo "конфлікт при rebase — пуш пропущено"
            exit 0
          fi

          python3 -c "import json; json.load(open('state.json'))" || exit 0
          git push
